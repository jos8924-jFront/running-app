<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <!-- html2canvas para descargar en png -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <title>Running app</title>
</head>
<body>
    <main class="flex column border-red">
        <div class="tittle-container border-white flex align-center content-center">
            <h2>Running App</h2>
        </div>
        <div class="content-container border-yellow flex row">
            <div class="leftpanel-container border-violet flex column align-center">
                <div class="input-container border-orange flex column content-center">
                    <label for="file">Subir archivo:</label>
                    <input type="file" class="file" id="file" accept=".tcx" placeholder="Subir archivo en formato .tcx">
                    <div class="message-container flex column align-center">
                        <p class="succes-message" id="succes-message">Sucess</p>
                        <p class="fail-message" id="fail-message">Fail</p>
                    </div>
                </div>
                <div class="adv-container border-pink">
                    <div class="flex column gap-1">
                        <h2>Selecciona que realizaras</h2>
                        <div class="flex content-center gap-2">
                            <label for="editar-reporte">Editar
                                <input type="radio" id="editar-reporte" value="editar" name="seleccion" data-target="editar-contenedor">
                            </label>
                            <label for="crear-reporte">Crear
                                <input type="radio" id="crear-reporte" value="crear" name="seleccion" data-target="crear-contenedor">
                            </label>
                        </div>
                    </div>
                    <div class="flex column gap-2 editar-contenedor" id="editar-contenedor">
                        <h2>Edicion de secciones:</h2>
                        <div class="flex column gap-1">
                            <label for="edit-tittle">Colocar titulo: 
                                <input type="text" id="edit-tittle">
                            </label>
                            <label for="edit-cadencia">Colocar cadencia:
                                <input type="number" id="edit-cadencia">
                            </label>
                        </div>
                        <div class="grid grid-1fr-1fr gap-1">
                            <h3 class="grid-span-2">Ocultar secciones:</h3>
                            <label for="hidden-tittle"> Titulo
                                <input type="checkbox" id="hidden-tittle">
                            </label>
                            <label for="hidden-date"> Fecha
                                <input type="checkbox" id="hidden-date">
                            </label>
                            <label for="hidden-distance"> Distancia
                                <input type="checkbox" id="hidden-distance">
                            </label>
                            <label for="hidden-pace"> Pace
                                <input type="checkbox" id="hidden-pace">
                            </label>
                            <label for="hidden-duration"> Duracion
                                <input type="checkbox" id="hidden-duration">
                            </label>
                            <label for="hidden-cadence"> Cadencia
                                <input type="checkbox" id="hidden-cadence">
                            </label>
                            <label for="hidden-bpm"> Frecuencia Cardiaca
                                <input type="checkbox" id="hidden-bpm">
                            </label>
                            <label for="hidden-logo"> Logo
                                <input type="checkbox" id="hidden-logo">
                            </label>
                        </div>
                    </div>
                    <div id="crear-contenedor">

                    </div>
                </div>
            </div>
            <div class="rightpanel-container border-blue flex">
                <div class="content-container flex column">
                    <div class="preview-container flex align-center content-center" id="preview-container">
                        <h2>Preview</h2>
                        
                    </div>

                    <!-- INFO GENERAL -->

                    <div class="info-container none column border-violet" id="info-container">
                    
                        <div class="flex fecha-container border-pink align-center content-end" id="date">
                            <h3 id="fecha"></h3>
                        </div>

                        <div class="flex align-center content-center" id="tittle">
                            <h1 class="titulo" id="titulo"></h1>
                        </div>

                        <div class="distancia-container flex column align-center content-center border-pink" id="distance">
                            <h2>Distancia</h2>
                            <h1 id="distancia"></h1>
                        </div>

                        <div class="pace-container flex column align-center content-center border-pink" id="ritmo">
                            <h2>Pace</h2>
                            <h1 id="pace"></h1>
                        </div>

                        <div class="duracion-container flex column align-center content-center border-pink" id="duration">
                            <h2>Duracion</h2>
                            <h1 id="duracion"></h1>
                        </div>

                        <div class="otros-container flex row align-center content-center border-pink">
                            <div class="cadence-container flex align-center content-center border-yellow" id="cadence">
                                
                                <img class="svg-img" src="assets/images/svg/cadence.svg" alt="cadence" crossorigin="anonymous">
                                <h2 id="cadencia"></h2>
                            </div>
                            <div class="fc-container flex row align-center content-center border-violet" id="bpm">
                                <img class="svg-img" src="assets/images/png/hearth.png" alt="hearth" >
                                <h2 id="avgHR"></h2>
                            </div>
                            
                        </div>

                        <div class="footer-container flex column align-center content-center border-pink" id="logo">
                            <div class="logo-container">
                                <img class="svg-logo" src="assets/images/svg/pumba.svg" alt="pumba">
                            </div>
                            
                            <h2>Pumba</h2>
                        </div>

                    </div>

                    <!-- Descarga -->
                    <div class="download-container flex align-center content-center">
                        <button id="download">Download</button>
                        <button id="reset">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <script type="module" src="js/main.js"></script>
</body>
</html>
